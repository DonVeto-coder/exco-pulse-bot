name: OEB Exco Pulse

on:
  schedule:
    - cron: "30 5 * * 1"
  workflow_dispatch: {}

jobs:
  render-and-publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: exco-pulse-bot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: pip install -r requirements.txt
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - name: Render dashboard and publish to SharePoint
        run: python run.py
        env:
          TENANT_ID: ${{ secrets.TENANT_ID }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          DRIVE_ID: ${{ secrets.DRIVE_ID }}
      - name: Save a copy of the render as a build artifact
        uses: actions/upload-artifact@v4
        with:
          name: pulse-png
          path: exco-pulse-bot/pulse.png
